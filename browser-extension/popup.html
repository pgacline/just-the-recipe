<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }
    h1 span {
      color: #059669;
    }
    p {
      font-size: 13px;
      color: #6b7280;
      margin: 0 0 16px 0;
    }
    button {
      width: 100%;
      background: #059669;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #047857;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h1>cut to the <span>recipe</span></h1>
  <p>Extract the recipe from this page.</p>
  <button id="extractBtn">Cut to the recipe</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
